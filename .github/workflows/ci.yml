name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    lint-and-test:
        runs-on: ubuntu-latest

        env:
            DATABASE_URL: postgresql://user:pass@localhost:5432/db
            DIRECT_URL: postgresql://user:pass@localhost:5432/db

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - run: npm ci

            - run: npm run lint

            - run: npm test

            - run: npx tsc --noEmit
